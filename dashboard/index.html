<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PayOps Operator Console" />
    <title>PayOps — Operator Console</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- API URL injected at build time via env; fallback to same-origin /api -->
    <script>
      window.__PAYOPS_API_URL__ = '%VITE_API_URL%' !== '%VITE_API_URL%'
        ? '%VITE_API_URL%'
        : '/api';
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
      body { background: #0d1117; }
      /* Initial loading state before React mounts */
      #root:empty::after {
        content: '';
        display: block;
        width: 32px; height: 32px;
        margin: 48vh auto 0;
        border: 2px solid #30363d;
        border-top-color: #58a6ff;
        border-radius: 50%;
        animation: spin .7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
