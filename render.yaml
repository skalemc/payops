# render.yaml — Deploy PayOps on Render
# Docs: https://render.com/docs/yaml-spec
# Run: Connect your GitHub repo in Render dashboard, it auto-detects this file.

services:
  # ── API server ──────────────────────────────────────────────────────────────
  - type: web
    name: payops-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: payops-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: OTP_EXPIRY_MINUTES
        value: "10"
      - key: CORS_ORIGINS
        value: https://app.payops.sg,https://my.payops.sg
      # Set these manually in Render dashboard:
      # SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, EMAIL_FROM
      # S3_ENDPOINT, S3_BUCKET, S3_ACCESS_KEY, S3_SECRET_KEY

  # ── Operator dashboard ───────────────────────────────────────────────────────
  - type: web
    name: payops-dashboard
    runtime: static
    rootDir: dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA fallback
    envVars:
      - key: VITE_API_URL
        value: https://payops-api.onrender.com/api

  # ── Employee portal ──────────────────────────────────────────────────────────
  - type: web
    name: payops-portal
    runtime: static
    rootDir: portal
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://payops-api.onrender.com/api

# ── PostgreSQL ───────────────────────────────────────────────────────────────
databases:
  - name: payops-db
    plan: starter            # $7/month — upgrade to standard for production
    databaseName: payops
    user: payops
