# /etc/nginx/sites-available/payops
# Use this if deploying on your own VPS (DigitalOcean, Hetzner, etc.)
# with Certbot SSL. Otherwise Railway/Render handle this automatically.
#
# Setup:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d app.payops.sg -d my.payops.sg -d api.payops.sg
#   sudo ln -s /etc/nginx/sites-available/payops /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ── API ───────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.payops.sg;

    ssl_certificate     /etc/letsencrypt/live/api.payops.sg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.payops.sg/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Rate limit — 20 req/s burst 40
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req zone=api burst=40 nodelay;

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── Operator dashboard ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.payops.sg;

    ssl_certificate     /etc/letsencrypt/live/app.payops.sg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.payops.sg/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    root /var/www/payops/dashboard/dist;
    index index.html;

    # Serve static assets with long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Employee portal ────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name my.payops.sg;

    ssl_certificate     /etc/letsencrypt/live/my.payops.sg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my.payops.sg/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    root /var/www/payops/portal/dist;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name app.payops.sg my.payops.sg api.payops.sg;
    return 301 https://$host$request_uri;
}
