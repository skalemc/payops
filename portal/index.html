<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PayOps Employee Portal" />
    <title>PayOps — Employee Portal</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      window.__PAYOPS_API_URL__ = '%VITE_API_URL%' !== '%VITE_API_URL%'
        ? '%VITE_API_URL%'
        : '/api';
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
      body { background: #f7f6f2; }
      #root:empty::after {
        content: '';
        display: block;
        width: 32px; height: 32px;
        margin: 48vh auto 0;
        border: 2px solid #e4e2db;
        border-top-color: #2d6a4f;
        border-radius: 50%;
        animation: spin .7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
