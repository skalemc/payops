version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: payops_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       payops_dev
      POSTGRES_USER:     payops_user
      POSTGRES_PASSWORD: devpassword123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U payops_user -d payops_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API Server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      target: base
    container_name: payops_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://payops_user:devpassword123@db:5432/payops_dev
      JWT_SECRET:   dev_secret_replace_in_production_64_chars_minimum_xxxxxxx
      JWT_EXPIRES_IN: 8h
      PORT:         4000
      NODE_ENV:     development
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
      OTP_EXPIRY_MINUTES: 10
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

  # ── Operator dashboard (React) ────────────────────────────────────────────────
  dashboard:
    image: node:22-alpine
    container_name: payops_dashboard
    working_dir: /app
    volumes:
      - ./dashboard:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://localhost:4000/api

  # ── Employee portal (React) ───────────────────────────────────────────────────
  portal:
    image: node:22-alpine
    container_name: payops_portal
    working_dir: /app
    volumes:
      - ./portal:/app
    ports:
      - "5174:5174"
    command: sh -c "npm install && npm run dev -- --host --port 5174"
    environment:
      VITE_API_URL: http://localhost:4000/api

volumes:
  pgdata:
